server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers (mirrors public/_headers for Cloudflare Pages)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # Cache static assets with immutable headers
    location /_next/static/ {
        expires max;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location /fonts/ {
        expires max;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # No-cache for HTML pages (SPA routes)
    location ~* \.html$ {
        add_header Cache-Control "no-store, must-revalidate";
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Static files
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000";
        access_log off;
    }

    # SPA routing — serve index.html for all unknown routes
    location / {
        try_files $uri $uri/ $uri.html /404.html =404;
    }

    # Health check endpoint (for Docker HEALTHCHECK)
    location = /health {
        access_log off;
        return 200 '{"status": "ok"}';
        add_header Content-Type application/json;
    }

    # 404 page
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}

